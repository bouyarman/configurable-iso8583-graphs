<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ISO8583 Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f7f7f7;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        h1, h2 {
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 300px;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            margin-top: 15px;
            padding: 10px 18px;
            cursor: pointer;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #efefef;
        }

        .ok {
            color: green;
            font-weight: bold;
        }

        .bad {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>ISO8583 Load Simulator</h1>

    <form method="post" action="/connect" th:object="${request}">
        <label>Host</label>
        <input type="text" th:field="*{host}" />

        <label>Port</label>
        <input type="number" th:field="*{port}" />

        <label>Type de lancement</label>
        <select th:field="*{launchStrategy}" id="launchStrategy">
            <option value="PARALLEL">Parallèle</option>
            <option value="SEQUENTIAL">Séquentiel</option>
        </select>

        <label for="testMode">Test Type</label>
        <select id="testMode" th:field="*{testMode}" class="form-control" onchange="toggleRampUpFields()">
            <option value="FIXED_TPS_PER_TERMINAL">Fixed TPS Per Terminal</option>
            <option value="RAMP_UP_TPS_PER_TERMINAL">Ramp-Up TPS Per Terminal</option>
            <option value="LINEAR_TPS_PER_TERMINAL">Linéaire TPS Par Terminal</option>
        </select>

        <label>Number of TPEs</label>
        <input type="number" th:field="*{terminalCount}" />

        <label>Timeout (ms)</label>
        <input type="number" th:field="*{timeoutMillis}" />

        <label>TPS per TPE</label>
        <input type="number" th:field="*{tpsPerTerminal}" />

        <div id="linearOptions" style="display:none;">
            <label>Target TPS Per Terminal</label>
            <input type="number" th:field="*{targetTpsPerTerminal}" min="1" />
        </div>

        <div id="sequentialOptions" style="display:none;">
            <label>Division (activation progressive)</label>
            <select th:field="*{sequentialDivision}">
                <option value="ONE_HALF">1/2</option>
                <option value="ONE_QUARTER">1/4</option>
                <option value="ONE_EIGHTH">1/8</option>
                <option value="ONE_TENTH">1/10</option>
            </select>
        </div>

        <div id="rampUpFields">
            <div class="form-group">
                <label for="rampUpStepTps">Ramp-Up Step TPS</label>
                <input type="number" id="rampUpStepTps" th:field="*{rampUpStepTps}" class="form-control" min="1" />
            </div>

            <div class="form-group">
                <label for="rampUpIntervalSeconds">Ramp-Up Interval (Seconds)</label>
                <input type="number" id="rampUpIntervalSeconds" th:field="*{rampUpIntervalSeconds}" class="form-control" min="1" />
            </div>
        </div>

        <label>Duration (seconds)</label>
        <input type="number" th:field="*{durationSeconds}" />

        <label>Min latency (ms)</label>
        <input type="number" th:field="*{minLatencyMs}" />

        <label>Max latency (ms)</label>
        <input type="number" th:field="*{maxLatencyMs}" />

        <label>Logs</label>
        <input type="checkbox" th:field="*{enableLogs}" />

        <br/>
        <button type="submit">Connecter</button>
    </form>
</div>

<div class="card" th:if="${simulationSession != null}">
    <h2>Résumé de connexion</h2>

    <p>Total demandé : <strong th:text="${simulationSession.requestedCount}"></strong></p>
    <p>Connectés : <strong class="ok" th:text="${simulationSession.connectedCount}"></strong></p>
    <p>Échoués : <strong class="bad" th:text="${simulationSession.failedCount}"></strong></p>

    <div th:if="${simulationSession.failedCount > 0}">
        <h3>TPE en erreur</h3>
        <table>
            <thead>
            <tr>
                <th>Terminal</th>
                <th>Erreur</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="result : ${simulationSession.failedResults}">
                <td th:text="${result.terminalId}"></td>
                <td th:text="${result.errorMessage}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <form method="get" action="/simulate">
        <button type="submit" th:disabled="${simulationSession.connectedCount == 0}">Simuler</button>
    </form>

    <p th:if="${message != null}" th:text="${message}"></p>
</div>
<div class="card" th:if="${result != null}">
    <h2>Résultat de simulation</h2>

    <p>Total transactions : <strong th:text="${result.totalTransactions}"></strong></p>
    <p>Succès : <strong class="ok" th:text="${result.success}"></strong></p>
    <p>Erreurs : <strong class="bad" th:text="${result.error}"></strong></p>
    <p>Timeout : <strong class="bad" th:text="${result.timeout}"></strong></p>

    <p>TPS global : <strong th:text="${result.tps}"></strong></p>
    <p>Latence moyenne (ms) : <strong th:text="${result.avgLatency}"></strong></p>
</div>
<script>
    function toggleRampUpFields() {
        const testMode = document.getElementById("testMode").value;
        const rampUpFields = document.getElementById("rampUpFields");

        if (testMode === "RAMP_UP_TPS_PER_TERMINAL") {
            rampUpFields.style.display = "block";
        } else {
            rampUpFields.style.display = "none";
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        toggleRampUpFields();
    });

    const launchSelect = document.getElementById("launchStrategy");
    const sequentialDiv = document.getElementById("sequentialOptions");

    function toggleSequentialOptions() {
        if (launchSelect.value === "SEQUENTIAL") {
            sequentialDiv.style.display = "block";
        } else {
            sequentialDiv.style.display = "none";
        }
    }

    // Initial check (important when page reloads)
    toggleSequentialOptions();

    // Listen for changes
    launchSelect.addEventListener("change", toggleSequentialOptions);

    const testModeSelect = document.getElementById("testMode");
    const rampUpFields = document.getElementById("rampUpFields");
    const linearOptions = document.getElementById("linearOptions");

    function toggleTestModeOptions() {
        const mode = testModeSelect.value;

        if (mode === "RAMP_UP_TPS_PER_TERMINAL") {
            rampUpFields.style.display = "block";
        } else {
            rampUpFields.style.display = "none";
        }

        if (mode === "LINEAR_TPS_PER_TERMINAL") {
            linearOptions.style.display = "block";
        } else {
            linearOptions.style.display = "none";
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        toggleTestModeOptions();
    });

    testModeSelect.addEventListener("change", toggleTestModeOptions);
</script>

</body>
</html>
